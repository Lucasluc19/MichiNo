  <script>
    (function() {
      try {
        const theme = JSON.parse(localStorage.getItem('michino_theme'));
        if (!theme) return;
        const c = theme.colors;
        const style = document.createElement('style');
        const BG_OPTIONS = [
          { id:'gradient1', value:'linear-gradient(135deg,#1a0800,#0a0000,#1a0500)' },
          { id:'gradient2', value:'linear-gradient(135deg,#000a1a,#00060d,#001a2a)' },
          { id:'gradient3', value:'linear-gradient(135deg,#001a00,#00060a,#001a0a)' },
          { id:'gradient4', value:'linear-gradient(135deg,#0a0015,#050010,#10001a)' },
          { id:'gradient5', value:'linear-gradient(135deg,#1a0a00,#100500,#0a0a00)' },
          { id:'pattern1',  value:'repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px)' },
          { id:'pattern2',  value:'radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px)' },
        ];
        const FONTS = [
          { id:'orbitron',  import:'https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap' },
          { id:'playfair',  import:'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap' },
          { id:'montserrat',import:'https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap' },
          { id:'oswald',    import:'https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap' },
        ];
        const fontData = FONTS.find(f => f.id === theme.font);
        if (fontData) {
          const link = document.createElement('link');
          link.rel = 'stylesheet'; link.href = fontData.import;
          document.head.appendChild(link);
        }
        let bgCSS = '';
        if (theme.bg === 'custom' && theme.bgImg) {
          bgCSS = `body::before{content:'';position:fixed;inset:0;background-image:url(${theme.bgImg});background-size:cover;background-position:center;opacity:${theme.bgOpacity/100};filter:blur(${theme.bgBlur}px);z-index:-1;pointer-events:none;}`;
        } else if (theme.bg && theme.bg !== 'none') {
          const bgOpt = BG_OPTIONS.find(b => b.id === theme.bg);
          if (bgOpt) bgCSS = `body::before{content:'';position:fixed;inset:0;background:${bgOpt.value};opacity:${theme.bgOpacity/100};filter:blur(${theme.bgBlur}px);z-index:-1;pointer-events:none;}`;
        }
        let effectsCSS = '';
        if (theme.effects && theme.effects.includes('glow')) effectsCSS += `.song-card:hover,.video-card:hover{box-shadow:0 0 30px ${c.accent}55;}`;
        if (theme.effects && theme.effects.includes('glass')) effectsCSS += `.song-card,.video-card{backdrop-filter:blur(10px);background:${c.surface}88 !important;}`;
        if (theme.effects && theme.effects.includes('grain')) effectsCSS += `body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:0.5;}`;
        if (theme.effects && theme.effects.includes('animated')) effectsCSS += `@keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}body{background-size:400% 400% !important;animation:bgShift 15s ease infinite;}`;
        style.textContent = `:root{--bg:${c.bg};--surface:${c.surface};--surface2:${c.surface2};--accent:${c.accent};--accent2:${c.accent2};--text:${c.text};--muted:${c.muted};--border:${c.border};}${bgCSS}${effectsCSS}.song-card,.video-card{border-radius:${theme.borderRadius||14}px !important;}`;
        document.head.appendChild(style);
      } catch(e) {}
    })();
  </script>

  <style>
    /* ══════════════════════════════════════════════════════════
       MICHINO- — RESPONSIVE DESIGN SYSTEM
       Breakpoints : 1280 · 1024 · 768 · 640 · 480 · 360
    ══════════════════════════════════════════════════════════ */

    /* ── CSS CUSTOM PROPERTIES ─────────────────────────────── */
    :root {
      --bg:          #070707;
      --surface:     #101010;
      --surface2:    #181818;
      --surface3:    #202020;
      --accent:      #ff3e00;
      --accent2:     #ff8c00;
      --text:        #f2f2f2;
      --text2:       #aaa;
      --muted:       #666;
      --border:      #1e1e1e;
      --radius:      14px;
      --radius-sm:   8px;
      /* Mis à jour par JS selon l'écran réel */
      --header-h:      64px;
      --player-h:      0px;
      --safe-bottom:   env(safe-area-inset-bottom, 0px);
      --safe-top:      env(safe-area-inset-top, 0px);
    }

    /* ── RESET ──────────────────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button {
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    img { display: block; max-width: 100%; }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(7,7,7,.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
      min-height: var(--header-h);
      flex-wrap: nowrap;
    }

    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.9rem;
      letter-spacing: 2px;
      flex-shrink: 0;
      line-height: 1;
      background: linear-gradient(135deg,#ff3e00,#ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .search-wrap {
      flex: 1;
      min-width: 0;
      max-width: 380px;
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      flex-shrink: 0;
    }
    #searchInput {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 36px 10px 40px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      /* ≥16px évite le zoom-auto iOS */
      font-size: max(.9rem, 16px);
      outline: none;
      transition: border-color .2s, background .2s;
    }
    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus { border-color: var(--accent); background: var(--surface3); }

    .search-clear {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: .85rem;
      display: none;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    /* ── NAV TABS (desktop) ─────────────────────────────────── */
    .nav-tabs {
      display: flex;
      gap: 2px;
      background: var(--surface2);
      border-radius: 24px;
      padding: 3px;
      flex-shrink: 0;
      margin-left: auto;
    }
    .nav-tab {
      background: none;
      border: none;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .7px;
      transition: all .2s;
      white-space: nowrap;
      min-height: 40px;
      display: flex;
      align-items: center;
    }
    .nav-tab.active, .nav-tab:hover { background: var(--accent); color: #fff; }

    /* ── MOBILE TABS ─────────────────────────────────────────── */
    .mobile-tabs {
      display: none;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: var(--header-h);
      z-index: 150;
    }
    .mobile-tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      padding: 0;
      height: 46px;
      font-family: 'Outfit', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      border-bottom: 2px solid transparent;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mobile-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── HERO ────────────────────────────────────────────────── */
    .hero {
      position: relative;
      padding: 48px 20px 36px;
      text-align: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,62,0,.1) 0%,transparent 70%);
      pointer-events: none;
    }
    .hero-title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: .95;
      letter-spacing: 3px;
      background: linear-gradient(135deg,#ff3e00 0%,#ff8c00 50%,#ffd000 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      margin-top: 12px;
      color: var(--text2);
      font-size: clamp(.72rem, 1.6vw, .9rem);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .hero-stats {
      display: flex;
      gap: clamp(16px, 5vw, 48px);
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .hero-stat { display: flex; flex-direction: column; align-items: center; }
    .hero-stat-n {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(1.6rem, 4.5vw, 2.2rem);
      color: var(--accent2);
      line-height: 1;
    }
    .hero-stat-l {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 2px;
    }

    /* ── GENRE BAR ───────────────────────────────────────────── */
    .genre-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 20px 10px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
      /* fade aux bords pour indiquer le scroll */
      mask-image: linear-gradient(to right, transparent 0px, black 16px, black calc(100% - 16px), transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0px, black 16px, black calc(100% - 16px), transparent 100%);
    }
    .genre-bar::-webkit-scrollbar { display: none; }
    .genre-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: .8rem;
      font-weight: 600;
      color: var(--text2);
      white-space: nowrap;
      transition: all .18s;
      flex-shrink: 0;
      min-height: 38px;
      display: flex;
      align-items: center;
    }
    .genre-pill:hover { border-color: var(--accent); color: var(--text); }
    .genre-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── CONTAINER ───────────────────────────────────────────── */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px;
      /* espace pour player fixe + safe area */
      padding-bottom: calc(var(--player-h) + 40px + var(--safe-bottom));
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 10px;
    }
    .section-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.45rem;
      color: var(--accent);
      letter-spacing: 2.5px;
      line-height: 1;
    }
    .section-count {
      font-size: .78rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 12px;
      white-space: nowrap;
    }

    /* ── SONGS GRID ──────────────────────────────────────────── */
    .songs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }
    .song-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform .22s, border-color .22s, box-shadow .22s;
      animation: fadeUp .35s ease both;
      -webkit-tap-highlight-color: transparent;
    }
    /* Hover uniquement sur les appareils avec souris */
    @media(hover:hover) and (pointer:fine) {
      .song-card:hover {
        transform: translateY(-5px);
        border-color: rgba(255,62,0,.5);
        box-shadow: 0 12px 40px rgba(0,0,0,.5);
      }
      .song-card:hover .cover img { transform: scale(1.06); }
      .song-card:hover .play-overlay { opacity: 1; }
    }
    /* Feedback tactile */
    .song-card:active { transform: scale(.98); }
    .song-card.playing {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(255,62,0,.3);
    }

    .cover {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg,#1a1a1a,#2a1200);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      overflow: hidden;
    }
    .cover img { width:100%; height:100%; object-fit:cover; transition:transform .4s; }

    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .2s;
    }
    .song-card.playing .play-overlay { opacity: 1; }
    /* Sur écran tactile : toujours visible en subtil */
    @media(hover:none) { .play-overlay { opacity: .25; } }

    .play-circle {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 4px 20px rgba(255,62,0,.6);
    }
    .playing-bars {
      position: absolute;
      bottom: 8px;
      right: 8px;
      display: none;
      gap: 2px;
      align-items: flex-end;
      height: 18px;
    }
    .song-card.playing .playing-bars { display: flex; }
    .playing-bars span {
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      animation: bars .8s ease infinite alternate;
    }
    .playing-bars span:nth-child(1){ height:8px;  animation-delay:0s; }
    .playing-bars span:nth-child(2){ height:14px; animation-delay:.15s; }
    .playing-bars span:nth-child(3){ height:10px; animation-delay:.3s; }
    @keyframes bars { to { height: 3px; } }

    .card-info { padding: 10px 11px 0; }
    .card-title {
      font-weight: 600;
      font-size: .88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-artist {
      color: var(--text2);
      font-size: .78rem;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 7px;
    }
    .genre-tag {
      background: rgba(255,140,0,.12);
      color: var(--accent2);
      padding: 2px 7px;
      border-radius: 10px;
      font-size: .68rem;
      font-weight: 600;
    }
    .dl-count { color: var(--muted); font-size: .73rem; }

    .card-actions { padding: 9px 11px 11px; display: flex; gap: 6px; }
    .btn-dl {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 8px;
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      transition: background .18s, transform .12s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 40px;
    }
    .btn-dl:hover { background: #d93400; }
    .btn-dl:active { transform: scale(.97); background: #c02d00; }

    /* ── VIDEOS GRID ─────────────────────────────────────────── */
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 14px;
    }
    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform .22s, border-color .22s, box-shadow .22s;
      animation: fadeUp .35s ease both;
      -webkit-tap-highlight-color: transparent;
    }
    @media(hover:hover) and (pointer:fine) {
      .video-card:hover {
        transform: translateY(-4px);
        border-color: rgba(255,62,0,.5);
        box-shadow: 0 12px 40px rgba(0,0,0,.5);
      }
      .video-card:hover .video-thumb img { transform: scale(1.05); }
      .video-card:hover .video-play-overlay { opacity: 1; }
    }
    .video-card:active { transform: scale(.99); }

    .video-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg,#181818,#0a0a18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      overflow: hidden;
    }
    .video-thumb img { width:100%; height:100%; object-fit:cover; transition:transform .4s; }
    .video-play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .2s;
    }
    @media(hover:none) { .video-play-overlay { opacity: .35; } }
    .video-play-btn {
      width: 60px;
      height: 60px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 4px 24px rgba(255,62,0,.6);
    }
    .video-views { color: var(--muted); font-size: .78rem; margin-top: 4px; }

    /* ── STATES & SKELETONS
